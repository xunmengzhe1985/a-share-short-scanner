      background: linear-gradient(180deg, #f7f9fb 0, #eef3f6 100%);

      border: 1px solid #cfd6e2;

    const saltB64 = "UxzYj7dRI709YYhhToLklg==";
    const ivB64 = "giNWLjTdUjlC/7lH";
    const iterations = 420000;

    function bytesFromBase64(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function decryptHtml(password) {
      const passBytes = new TextEncoder().encode(password);
      const keyMaterial = await crypto.subtle.importKey("raw", passBytes, "PBKDF2", false, ["deriveKey"]);
      const key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: bytesFromBase64(saltB64), iterations, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
      const payloadBytes = bytesFromBase64(encryptedPayload);
      const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: bytesFromBase64(ivB64) }, key, payloadBytes);
      return new TextDecoder().decode(plain);

    document.getElementById("unlockForm").addEventListener("submit", async function (event) {

      const password = document.getElementById("unlockPassword").value;
      const button = document.getElementById("unlockButton");
      const status = document.getElementById("unlockStatus");
      if (!password) {
        status.textContent = "请输入访问密码。";
        return;
      }
      button.disabled = true;
      button.textContent = "正在解锁";
      status.textContent = "";
      try {

        document.open();
        document.write(appHtml);
        document.close();
