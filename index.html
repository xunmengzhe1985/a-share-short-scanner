    const iterations = 420000;

    function bytesFromBase64(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function decryptHtml(password) {
      const passBytes = new TextEncoder().encode(password);
      const keyMaterial = await crypto.subtle.importKey("raw", passBytes, "PBKDF2", false, ["deriveKey"]);
      const key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: bytesFromBase64(saltB64), iterations, hash: "SHA-256" },

        { name: "AES-GCM", length: 256 },

        ["decrypt"]
